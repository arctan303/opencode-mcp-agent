name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Configure the agent with...
        2. Send a request to...
        3. Observe the error...
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: A clear description of what you expected to happen.
      placeholder: Describe what you expected...
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: A clear description of what actually happened.
      placeholder: Describe what actually happened...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Please provide details about your environment.
      placeholder: |
        - OS: [e.g., Windows 11, macOS 14, Ubuntu 22.04]
        - Node.js version: [e.g., 20.11.0]
        - OpenCode version: [e.g., 0.1.0]
        - MCP client: [e.g., Claude Desktop, VS Code Copilot]
    validations:
      required: true

  - type: textarea
    id: tool-and-arguments
    attributes:
      label: Tool and Arguments
      description: If applicable, provide the tool name and arguments used. **Please sanitize any credentials or sensitive information.**
      placeholder: |
        Tool: read_file
        Arguments: { "path": "/example/path" }
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: If applicable, paste relevant log output. **Please remove any sensitive information before sharing.**
      render: shell
      placeholder: Paste logs here...
    validations:
      required: false
